<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MindCanvas</title>
  <style>
    @font-face{font-family:'Caveat';font-style:normal;font-weight:400 700;src:local('Caveat'),local('Bradley Hand'),local('Comic Sans MS')}
    @font-face{font-family:'Noto Sans TC';font-style:normal;font-weight:300 500 700;src:local('Noto Sans TC'),local('Microsoft JhengHei'),local('PingFang TC'),sans-serif}
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Login overlay -->
    <div id="login-overlay" class="login-overlay">
      <div class="login-box">
        <div class="login-icon">🔐</div>
        <h1>MindCanvas</h1>
        <p class="login-subtitle">手寫心智圖</p>
        <div id="login-error" class="login-error hidden"></div>
        <input type="password" id="login-password" placeholder="請輸入密碼" autofocus />
        <button id="login-btn">登入</button>
        <p class="login-hint">按 Enter 登入</p>
      </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <div class="toolbar-group">
        <button id="btn-mode-edit" class="tool-btn active" title="編輯模式 (E)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button id="btn-mode-ink" class="tool-btn" title="手寫模式 (W)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
        </button>
      </div>
      <div class="toolbar-group" id="ink-tools" style="display:none;">
        <div class="color-picker-container">
          <input type="color" id="ink-color" value="#2c2c2c" title="筆跡顏色" />
        </div>
        <div class="size-control">
          <label>粗</label>
          <input type="range" id="ink-size" min="1" max="12" value="3" step="0.5" />
          <label>細</label>
        </div>
        <button id="btn-ink-undo" class="tool-btn" title="復原筆跡 (Ctrl+Z)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button id="btn-ink-clear" class="tool-btn" title="清除所有筆跡">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h18M8 5V3h8v2"/><path d="M7 5l1 15h8l1-15"/></svg>
        </button>
      </div>
      <div class="toolbar-group" id="edit-tools">
        <button id="btn-add-child" class="tool-btn" title="新增子節點 (Tab)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="btn-add-sibling" class="tool-btn" title="新增同級節點 (Enter)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><path d="M12 5l7 7-7 7"/></svg>
        </button>
        <button id="btn-delete" class="tool-btn" title="刪除節點 (Delete)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
        <button id="btn-collapse" class="tool-btn" title="折疊/展開 (Space)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="toolbar-spacer"></div>
      <div class="toolbar-group">
        <button id="btn-sync" class="tool-btn" title="同步 (Git)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button id="btn-save" class="tool-btn" title="儲存 (Ctrl+S)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
        <button id="btn-open" class="tool-btn" title="開啟檔案 (Ctrl+O)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button id="btn-export" class="tool-btn" title="匯出 PNG">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button id="btn-export-md" class="tool-btn" title="匯出 Markdown">#</button>
        <button id="btn-import" class="tool-btn" title="匯入檔案">📂</button>
        <button id="btn-history" class="tool-btn" title="版本還原">⏱</button>
      </div>
      <div class="toolbar-group">
        <button id="btn-zoom-in" class="tool-btn" title="放大 (+)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <span id="zoom-level">100%</span>
        <button id="btn-zoom-out" class="tool-btn" title="縮小 (-)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button id="btn-fit" class="tool-btn" title="重置視圖">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
      </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-text">就緒</span>
      <span id="sync-status"><span class="dot offline"></span><span id="sync-label">離線</span></span>
      <span id="mode-indicator">✏️ 編輯模式</span>
    </div>

    <!-- Main canvas -->
    <div id="canvas-container">
      <canvas id="main-canvas"></canvas>
    </div>

    <!-- File modal -->
    <div id="file-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>開啟檔案</h2>
          <button class="close-btn">&times;</button>
        </div>
        <div class="modal-body" id="file-list">
          <p class="empty-msg">暫無儲存檔案</p>
        </div>
      </div>
    </div>

    <!-- Context menu -->
    <div id="context-menu" class="context-menu hidden"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
